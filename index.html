<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Application</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #errorModal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        #modalContent { background: #fff; padding: 20px; margin: 15% auto; width: 300px; }
    </style>
</head>
<body>
    <div id="errorModal">
        <div id="modalContent">
            <h2>Error</h2>
            <p>Failed to connect to the API. Please try again.</p>
            <button id="retryButton">Retry</button>
        </div>
    </div>

    <script>
        let loading = false;
        let fetchData = async () => {
            if (loading) return;
            loading = true;
            try {
                let response = await fetch('https://api.example.com/data');
                if (!response.ok) throw new Error('Network response was not okay');
                let data = await response.json();
                console.log(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('errorModal').style.display = 'block';
            } finally {
                loading = false;
            }
        };

        document.getElementById('retryButton').onclick = function() {
            document.getElementById('errorModal').style.display = 'none';
            fetchData();
        };

        // Initial data fetch
        fetchData();
    </script>
</body>
</html>
